# profiles.yml — place in ~/.dbt/profiles.yml (not in project root)
# Uses dbt-databricks adapter: pip install dbt-databricks

dividend_databricks:
  target: dev
  outputs:

    dev:
      type: databricks
      catalog: workspace          # replace with Unity Catalog name if using UC (e.g. main)
      schema: dividend_db
      host: "{{ env_var('DATABRICKS_HOST') }}"           # e.g. adb-xxxx.azuredatabricks.net
      http_path: "{{ env_var('DATABRICKS_HTTP_PATH') }}" # e.g. /sql/1.0/warehouses/xxxx
      token: "{{ env_var('DATABRICKS_TOKEN') }}"
      threads: 4

